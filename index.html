<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automathix</title>
	<link rel="icon" type="image/svg+xml" href="src/images/robot.svg">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>

    <!-- KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.15.1/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.15.1/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.15.1/dist/contrib/auto-render.min.js"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- JSXGraph -->
    <script type="text/javascript" charset="UTF-8" src="https://cdn.jsdelivr.net/npm/jsxgraph@1.6.1/distrib/jsxgraphcore.js"></script>
    
    <!-- Sortable.js -->
    <script src="https://raw.githack.com/SortableJS/Sortable/master/Sortable.js"></script>

    <!-- Style global -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen font-sans flex flex-col">

    <!-- Header  -->
    <header class="max-w-4xl mx-auto w-full p-6 text-center relative">
        <button id="help-toggle" class="absolute top-4 right-12 text-gray-500 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-700 p-2 rounded-lg z-10"><i class="fas fa-circle-question text-xl"></i></button>
        <button id="theme-toggle" class="absolute top-4 right-4 text-gray-500 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-700 p-2 rounded-lg z-10">
            <i id="theme-toggle-dark-icon" class="fas fa-moon text-lg"></i>
            <i id="theme-toggle-light-icon" class="fas fa-sun text-lg hidden"></i>
        </button>
        <h1 id="main-title" class="text-3xl md:text-4xl font-bold text-blue-600 dark:text-blue-400 cursor-pointer hover:opacity-80 transition-opacity inline-block">
			<i class="fas fa-robot mr-3"></i>Automathix
		</h1>
        <p class="text-gray-600 dark:text-gray-400 mt-2">Pour s'entraîner aux automatismes</p>
    </header>

    <!-- Vue dynamique (C'est ici que le JS injecte le contenu) -->
    <main id="app" class="flex-grow max-w-4xl mx-auto w-full p-4 md:p-6"></main>

    <!-- Footer  -->
    <footer class="mt-16 py-8 border-t border-gray-200 dark:border-gray-700 text-center transition-colors duration-300">
            <div class="flex flex-col items-center justify-center space-y-2">
                
                <!-- Titre et Copyright -->
                <p class="text-gray-600 dark:text-gray-400 text-sm font-medium">
                    Automathix &copy; 2026
                </p>

                <!-- Icônes Creative Commons -->
                <div class="text-gray-500 dark:text-gray-500 text-lg space-x-1">
                    <i class="fab fa-creative-commons" title="Creative Commons"></i>
                    <i class="fab fa-creative-commons-by" title="Attribution"></i>
                    <i class="fab fa-creative-commons-nc" title="Pas d'utilisation commerciale"></i>
                    <i class="fab fa-creative-commons-sa" title="Partage dans les mêmes conditions"></i>
                </div>

                <!-- Texte de la licence -->
                <p class="text-gray-500 dark:text-gray-500 text-xs max-w-md mx-auto">
                    Cette application est mise à disposition sous licence libre <br class="hidden sm:inline">
                    <a href="https://creativecommons.org/licenses/by-nc-sa/4.0/deed.fr" target="_blank" class="hover:text-blue-500 underline decoration-dotted">CC BY-NC-SA 4.0</a>.
                    <br>Code source ouvert, modifiable et redistribuable pour un usage pédagogique.
                </p>
            </div>
    </footer>
  
    <!-- Modale d'aide (cachée par défaut) -->
    <div id="help-modal" class="fixed inset-0 z-50 hidden" aria-labelledby="modal-title" role="dialog" aria-modal="true">
        <!-- Fond sombre transparent -->
        <div class="fixed inset-0 bg-gray-500 bg-opacity-75 dark:bg-gray-900 dark:bg-opacity-75 transition-opacity backdrop-blur-sm" id="help-modal-backdrop"></div>

        <div class="fixed inset-0 z-10 overflow-y-auto">
            <div class="flex min-h-full items-center justify-center p-4 text-center sm:p-0">
                
                <!-- Contenu de la modale -->
                <div class="relative transform overflow-hidden rounded-lg bg-white dark:bg-gray-800 text-left shadow-xl transition-all sm:my-8 sm:w-full sm:max-w-lg border border-gray-200 dark:border-gray-700">
                    
                    <!-- En-tête -->
                    <div class="bg-blue-50 dark:bg-gray-700 px-4 py-3 sm:px-6 flex justify-between items-center border-b border-blue-100 dark:border-gray-600">
                        <h3 id="help-modal-title" class="text-lg font-semibold leading-6 text-blue-900 dark:text-blue-100">
                            
                        </h3>
                        <button type="button" id="close-help-btn" class="text-gray-400 hover:text-gray-500 dark:hover:text-gray-300 focus:outline-none">
                            <i class="fas fa-times text-xl"></i>
                        </button>
                    </div>

                    <!-- Corps du texte -->
                    <div id="help-modal-body" class="px-4 py-5 sm:p-6 text-gray-700 dark:text-gray-300 space-y-4 text-sm">
										    
                    </div>
                    
                    <!-- Pied de page -->
                    <div class="bg-gray-50 dark:bg-gray-700/50 px-4 py-3 flex flex-row-reverse sm:px-6">
                        <button type="button" id="close-help-btn-bottom" class="inline-flex w-auto justify-center rounded-md bg-blue-600 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-blue-500 sm:ml-3">
                            Compris !
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="src/main.js"></script>
</body>
</html>
